  <div class="app">

  <script>
    /* ======================================================
SUPABASE
====================================================== */

const supabaseClient =
supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

/* ======================================================
USER
====================================================== */

const usuario =
JSON.parse(
  localStorage.getItem(
    "usuarioLogado"
  )
)

console.log(
  "USUARIO:",
  usuario
)
console.log(
  "ID:",
  usuario?.id
)

console.log(
  "NOME:",
  usuario?.nome
)

console.log(
  "TELEFONE:",
  usuario?.telefone
)
/* ======================================================
SEM LOGIN
====================================================== */

if(!usuario){

  window.location.href =
  "../../../../login.html"

}

/* ======================================================
USER UI
====================================================== */

document
.getElementById("user")
.innerHTML = `

  <div
    class="avatar"
    style="
      background-image:url(
        '${
          usuario.foto_url ||
          ""
        }'
      )
    "
  ></div>

  <div class="user-info">

    <div class="user-name">
      ${usuario.nome}
    </div>

<div class="user-role">
  ${usuario.cargo || "-"}
</div>

<div
  id="rankingUsuario"
  style="
    display:none;
  "
></div>
`

/* ======================================================
LOAD
====================================================== */

let carregando = false
let rankingSetor = []

let meusPontos = 0

let minhaPosicao = 0
/* ======================================================
RENDER RANKING USER
====================================================== */

function renderRankingUsuario(){

  const el = document.getElementById(
    "rankingUsuario"
  )

  if(!el) return

  el.style.display = "inline-flex"

  el.style.alignItems = "center"

  el.style.gap = "8px"

  el.style.marginTop = "6px"

  el.style.background = "#eff6ff"

  el.style.border =
    "1px solid #bfdbfe"

  el.style.color = "#1d4ed8"

  el.style.padding = "7px 12px"

  el.style.borderRadius = "999px"

  el.style.fontSize = "11px"

  el.style.fontWeight = "900"

  el.style.cursor = "pointer"

  el.onclick = abrirRankingSetor

  el.innerHTML = `

    ⭐ ${meusPontos} pts

    •

    #${minhaPosicao || "-"}

    ${usuario.setor || "-"}

  `

}

/* ======================================================
RANKING SETOR
====================================================== */

async function calcularRankingSetor(){

  const { data:tarefas, error } = await supabaseClient
    .from("tarefas_checklist")
    .select("*")
    .eq("ativo", true)

  if(error){
    console.log("ERRO RANKING:", error)
    rankingSetor = []
    meusPontos = 0
    minhaPosicao = 0
    return
  }

  const ranking = {}

  ;(tarefas || []).forEach(t=>{

    const responsaveis = Array.isArray(t.responsaveis)
      ? t.responsaveis
      : []

    responsaveis.forEach(r=>{

      const nome = r.nome || "SEM NOME"

      if(!ranking[nome]){

        ranking[nome] = {
          nome,
          foto: r.foto_url || "",
          setor: r.setor || "",
          cargo: r.cargo || "",
          pontos: 0,
          tarefas: 0,
          concluidas: 0,
          atrasadas: 0
        }

      }

      ranking[nome].tarefas++

      /* ==================================================
      REGRA DE PONTUAÇÃO
      --------------------------------------------------
      SOMENTE tarefa concluída soma ponto.
      Qualquer tarefa com status CONCLUIDO vale 1 ponto.
      Não existe bônus por urgência.
      Não existe ponto por item respondido no checklist.
      Não existe bônus por tarefa compartilhada.
      Não existe desconto por atraso ou cancelamento.
      ================================================== */

     if(statusNormalizado(t.status) === "CONCLUIDO"){
        ranking[nome].concluidas++
        ranking[nome].pontos += 1
      }

    if(statusNormalizado(t.status) === "ATRASADO"){
        ranking[nome].atrasadas++
      }

    })

  })

  rankingSetor = Object.values(ranking)
    .filter(r => r.setor === usuario.setor)
    .sort((a,b) => b.pontos - a.pontos)

  minhaPosicao = rankingSetor.findIndex(r =>
    r.nome === usuario.nome
  ) + 1

  meusPontos = rankingSetor.find(r =>
    r.nome === usuario.nome
  )?.pontos || 0

}

    function statusNormalizado(status){

  return String(status || "")
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")

}






    
async function carregar(){

  if(carregando) return

  carregando = true

  /* ======================================================
  RANKING
  ====================================================== */

  await calcularRankingSetor()

  renderRankingUsuario()

  const lista =
  document.getElementById(
    "lista"
  )

  /* ======================================================
  BUSCAR TAREFAS
  ====================================================== */

  const {
    data,
    error
  } = await supabaseClient

.from("tarefas_checklist")
.select("*")
.order(
  "created_at",
  {
    ascending:false
  }
)

  console.log(
    data,
    error
  )

  /* ======================================================
  ERRO
  ====================================================== */

  if(error){

    lista.innerHTML = `
      <div class="empty">
        Erro ao carregar
      </div>
    `

    carregando = false

    return

  }

  /* ======================================================
  FILTRAR USUÁRIO
  ====================================================== */

const tarefas =
(data || [])
.filter(t => {
  const status = statusNormalizado(t.status)

  return (
    t.ativo === true ||
    status === "CONCLUIDO"
  )
})
.filter(t=>{

    let responsaveis = []

    try{

      responsaveis =

        Array.isArray(
          t.responsaveis
        )

        ? t.responsaveis

        : JSON.parse(
            t.responsaveis || "[]"
          )

    }catch{

      responsaveis = []

    }

    return responsaveis.some(r=>{

      /* =========================================
      ID
      ========================================= */

      const idMatch =

        String(
          r.id || ""
        ).trim()

        ===

        String(
          usuario.id || ""
        ).trim()

      /* =========================================
      NOME
      ========================================= */

      const nomeMatch =

        String(
          r.nome || ""
        )
        .trim()
        .toUpperCase()

        ===

        String(
          usuario.nome || ""
        )
        .trim()
        .toUpperCase()

      /* =========================================
      TELEFONE
      ========================================= */

      const telefoneMatch =

        usuario.telefone

        ? (

            String(
              r.telefone || ""
            ).trim()

            ===

            String(
              usuario.telefone || ""
            ).trim()

          )

        : false

      /* =========================================
      RETORNO
      ========================================= */

      return (

        idMatch

        ||

        nomeMatch

        ||

        telefoneMatch

      )

    })

  })

  console.log(
    "MINHAS:",
    tarefas
  )

  /* ======================================================
  DATA OPERACIONAL BAHIA
  ====================================================== */

  const agoraBahia = new Date(
    new Date().toLocaleString(
      "en-US",
      {
        timeZone:"America/Bahia"
      }
    )
  )

  const horaAtual =
  agoraBahia.getHours()

  const diaOperacional =
  new Date(agoraBahia)

  /* ======================================================
  MADRUGADA
  ====================================================== */

  if(horaAtual < 5){

    diaOperacional.setDate(
      diaOperacional.getDate() - 1
    )

  }

  const diaAtualStr =

    diaOperacional
    .toLocaleDateString(
      "sv-SE"
    )

  /* ======================================================
  FILTRAR DIA
  ====================================================== */

  const tarefasDoDia =

    tarefas.filter(t=>{

      const dataBase =

        t.data_limite

        ||

        t.created_at

      if(!dataBase){

        return false

      }

      const dataTarefa = new Date(

        new Date(dataBase)
        .toLocaleString(
          "en-US",
          {
            timeZone:"America/Bahia"
          }
        )

      )

      /* =========================================
      MADRUGADA
      ========================================= */

      if(
        dataTarefa.getHours() < 5
      ){

        dataTarefa.setDate(
          dataTarefa.getDate() - 1
        )

      }

      const diaTarefa =

        dataTarefa
        .toLocaleDateString(
          "sv-SE"
        )

      return (
        diaTarefa ===
        diaAtualStr
      )

    })

  tarefas.length = 0

  tarefas.push(
    ...tarefasDoDia
  )
/* ======================================================
TODAS CONCLUÍDAS
====================================================== */

const totalTarefas = tarefas.length

const totalConcluidas = tarefas.filter(t =>
  statusNormalizado(t.status) === "CONCLUIDO"
).length



const chavePopup =
  "popup_concluido_" + diaAtualStr

const jaMostrou =
  localStorage.getItem(chavePopup)

if(
  totalTarefas > 0 &&
  totalConcluidas === totalTarefas &&
  !jaMostrou
){

  /* ======================================================

  ====================================================== */

  function converterBahia(data){

    if(!data) return null

    if(typeof data === "string"){

      return new Date(
        data + "-03:00"
      )

    }

    return new Date(data)

  }

  /* ======================================================
  FORMATAR HORA
  ====================================================== */

  function formatarHora(data){

    if(!data) return "--:--"

    return converterBahia(data)
    .toLocaleTimeString(
      "pt-BR",
      {
        timeZone:"America/Bahia",
        hour:"2-digit",
        minute:"2-digit"
      }
    )

  }

  /* ======================================================
  ORDENAR
  ====================================================== */

  tarefas.sort((a,b)=>{

    const aConcluido =
      a.status === "CONCLUIDO"

    const bConcluido =
      b.status === "CONCLUIDO"

    const aAtrasada =
      (
        a.checklist || []
      ).some(
        i => i.atrasado === true
      )

    const bAtrasada =
      (
        b.checklist || []
      ).some(
        i => i.atrasado === true
      )

    /* =========================================
    ATRASADAS PRIMEIRO
    ========================================= */

    if(
      aAtrasada &&
      !bAtrasada
    ){
      return -1
    }

    if(
      !aAtrasada &&
      bAtrasada
    ){
      return 1
    }

    /* =========================================
    PENDENTES NO MEIO
    ========================================= */

    if(
      !aConcluido &&
      bConcluido
    ){
      return -1
    }

    if(
      aConcluido &&
      !bConcluido
    ){
      return 1
    }

    /* =========================================
    CONCLUÍDAS POR ÚLTIMO
    ========================================= */

    if(
      aConcluido &&
      bConcluido
    ){

      return (

        converterBahia(
          a.updated_at ||
          a.created_at
        )

        -

        converterBahia(
          b.updated_at ||
          b.created_at
        )

      )

    }

    return (

      converterBahia(
        b.created_at
      )

      -

      converterBahia(
        a.created_at
      )

    )

  })

const total =

window.__TAREFAS__ =

/* ======================================================
TRANSFERIR TAREFA
====================================================== */

async function transferirTarefa(

  tarefaId,
  novoUsuarioId

){

  /* =========================================
  BUSCAR USUÁRIO
  ========================================= */

  const {
    data:userData,
    error:userError
  } = await supabaseClient

  .from("usuarios_do_sistema")

  .select("*")

  .eq(
    "id",
    novoUsuarioId
  )

  .single()

  if(userError || !userData){

    alert(
      "Usuário não encontrado"
    )

    return

  }

  /* =========================================
  BUSCAR TAREFA
  ========================================= */

  const {
    data:tarefaData
  } = await supabaseClient

  .from("tarefas_checklist")

  .select("*")

  .eq(
    "id",
    tarefaId
  )

  .single()

  /* =========================================
  UPDATE
  ========================================= */

  const {
    error:updateError
  } = await supabaseClient

  .from("tarefas_checklist")

  .update({

    responsaveis:[{

      id:userData.id,
      nome:userData.nome,
      telefone:userData.telefone,
      cargo:userData.cargo,
      setor:userData.setor,
      foto_url:userData.foto_url

    }]

  })

  .eq(
    "id",
    tarefaId
  )

  if(updateError){

    console.log(updateError)

    alert(
      "Erro ao transferir"
    )

    return

  }

  /* =========================================
  ACIONAR API RECADOS
  NÃO QUEBRA O FLUXO
  ========================================= */

  try{

    fetch(
      "/api/assistente_gerentes/recados.js",
      {

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          nome:userData.nome || "",

          telefone:userData.telefone || "",

          titulo:
            tarefaData?.titulo
            ||
            "Nova tarefa"

        })

      }
    )
    .then(r=>r.json())
    .then(res=>{

      console.log(
        "RECADO ENVIADO:",
        res
      )

    })
    .catch(err=>{

      console.log(
        "ERRO API RECADOS:",
        err
      )

    })

  }catch(e){

    console.log(
      "ERRO GERAL API:",
      e
    )

  }

  document
  .querySelectorAll(
    ".popup-users"
  )
  .forEach(p=>p.remove())

  alert(
    "Tarefa transferida"
  )

  carregar()

}
