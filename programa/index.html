<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
minimum-scale=1.0,
user-scalable=no,
viewport-fit=cover" />

  <title>CheckFlow Operacional</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <style>
    /* =======================================================
RESET
======================================================= */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f1fbf5;
      touch-action: manipulation;
    }

    button,
    iframe {
      border: 0;
    }

    /* =======================================================
VARIÁVEIS — VERDE CLARO FINO
======================================================= */

    :root {
      --verde-950: #052e1a;
      --verde-900: #064e2b;
      --verde-800: #076b3a;
      --verde-700: #0f8f4d;
      --verde-600: #16a85a;
      --verde-500: #22c55e;
      --verde-400: #4ade80;
      --verde-300: #86efac;
      --verde-200: #bbf7d0;
      --verde-100: #dcfce7;
      --verde-50: #f0fdf4;

      --branco: #ffffff;
      --texto: #0f172a;
      --muted: #64748b;
      --linha: #d9f5e2;

      --sombra-menu: 8px 0 28px rgba(15, 118, 69, .10);
      --sombra-card: 0 16px 42px rgba(15, 23, 42, .08);
      --sombra-popup: 0 35px 100px rgba(5, 46, 26, .22);
    }

    /* =======================================================
LAYOUT PRINCIPAL
======================================================= */

    .layout {
      width: 100%;
      height: 100vh;
      height: 100dvh;

      display: flex;
      overflow: hidden;

      background:
        radial-gradient(circle at 0% 0%, rgba(34, 197, 94, .12), transparent 34%),
        radial-gradient(circle at 100% 0%, rgba(187, 247, 208, .45), transparent 30%),
        linear-gradient(135deg, #fbfffc 0%, #f1fbf5 48%, #eaf8ef 100%);
    }

    /* =======================================================
MENU LATERAL — MAIS FINO
======================================================= */

    .sidebar-black {
      width: 82px;
      min-width: 82px;
      height: 100%;

      background:
        linear-gradient(180deg,
          rgba(255, 255, 255, .92) 0%,
          rgba(240, 253, 244, .96) 48%,
          rgba(220, 252, 231, .95) 100%);

      border-right: 1px solid rgba(134, 239, 172, .55);

      box-shadow: var(--sombra-menu);

      display: flex;
      flex-direction: column;
      align-items: center;

      padding: 14px 8px;
      gap: 8px;

      z-index: 50;
    }

    /* =======================================================
MARCA
======================================================= */

    .brand-box {
      width: 100%;
      height: 60px;

      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;

      border-radius: 20px;

      background: rgba(255, 255, 255, .72);
      border: 1px solid rgba(187, 247, 208, .72);

      margin-bottom: 4px;

      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .95),
        0 8px 18px rgba(22, 163, 74, .07);
    }

    .brand-mark {
      width: 30px;
      height: 30px;

      border-radius: 11px;

      background: #f0fdf4;
      border: 1.8px solid var(--verde-600);

      position: relative;
    }

    .brand-mark::before {
      content: "";
      position: absolute;

      width: 14px;
      height: 8px;

      left: 7px;
      top: 9px;

      border-left: 2.8px solid var(--verde-700);
      border-bottom: 2.8px solid var(--verde-700);

      transform: rotate(-45deg);
      border-radius: 2px;
    }

    .brand-text {
      margin-top: 4px;
      font-size: 7.7px;
      font-weight: 900;
      letter-spacing: -.35px;
      color: var(--verde-900);
    }

    /* =======================================================
ITEM MENU
======================================================= */

    .side-item {
      width: 100%;
      min-height: 62px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      gap: 5px;

      cursor: pointer;
      position: relative;

      border-radius: 19px;

      color: var(--verde-900);

      background: rgba(255, 255, 255, .58);

      border: 1px solid rgba(187, 247, 208, .58);

      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .84),
        0 6px 16px rgba(22, 163, 74, .045);

      transition:
        transform .17s ease,
        background .17s ease,
        border-color .17s ease,
        box-shadow .17s ease;
    }

    .side-item:hover {
      transform: translateY(-1px);

      background: #ffffff;

      border-color: rgba(74, 222, 128, .82);

      box-shadow:
        0 10px 24px rgba(22, 163, 74, .11),
        inset 0 1px 0 rgba(255, 255, 255, .96);
    }

    .side-item.active {
      background: #ffffff;

      border-color: rgba(34, 197, 94, .95);

      box-shadow:
        0 12px 28px rgba(22, 163, 74, .16),
        inset 0 1px 0 rgba(255, 255, 255, .96);
    }

    .side-item.active::before {
      content: "";
      position: absolute;

      left: -8px;
      top: 50%;

      width: 4px;
      height: 30px;

      border-radius: 999px;

      background: linear-gradient(180deg, #86efac, #16a34a);

      box-shadow:
        0 0 16px rgba(34, 197, 94, .65),
        0 0 28px rgba(34, 197, 94, .25);

      transform: translateY(-50%);
    }

    /* =======================================================
ÍCONE BASE — LINHA SIMPLES
======================================================= */

    .side-icon {
      width: 28px;
      height: 28px;

      position: relative;

      display: flex;
      align-items: center;
      justify-content: center;

      color: var(--verde-800);
    }

    .side-item:hover .side-icon,
    .side-item.active .side-icon {
      color: var(--verde-700);
    }

    /* =======================================================
ÍCONE DASHBOARD — GRÁFICO SIMPLES
======================================================= */

    .home-icon::before {
      content: "";
      position: absolute;

      width: 4px;
      height: 14px;
      left: 6px;
      bottom: 5px;

      border-radius: 999px;
      background: currentColor;

      box-shadow:
        7px -5px 0 currentColor,
        14px -1px 0 currentColor;
    }

    .home-icon::after {
      content: "";
      position: absolute;

      width: 21px;
      height: 2px;

      left: 4px;
      bottom: 4px;

      border-radius: 999px;
      background: currentColor;
      opacity: .55;
    }

    /* =======================================================
ÍCONE EQUIPE — PESSOAS SIMPLES
======================================================= */

    .team-icon::before {
      content: "";
      position: absolute;

      width: 8px;
      height: 8px;

      top: 5px;
      left: 10px;

      border: 2px solid currentColor;
      border-radius: 50%;

      box-shadow:
        -9px 4px 0 -2px currentColor,
        9px 4px 0 -2px currentColor;
    }

    .team-icon::after {
      content: "";
      position: absolute;

      width: 20px;
      height: 10px;

      left: 4px;
      bottom: 5px;

      border: 2px solid currentColor;
      border-top: none;

      border-radius: 0 0 12px 12px;
    }

    /* =======================================================
ÍCONE CHECKLIST — LISTA SIMPLES
======================================================= */

    .task-icon::before {
      content: "";
      position: absolute;

      width: 18px;
      height: 21px;

      left: 5px;
      top: 3px;

      border: 2px solid currentColor;
      border-radius: 5px;
    }

    .task-icon::after {
      content: "";
      position: absolute;

      width: 9px;
      height: 5px;

      left: 10px;
      top: 12px;

      border-left: 2.5px solid currentColor;
      border-bottom: 2.5px solid currentColor;

      transform: rotate(-45deg);
      border-radius: 1px;
    }

    /* =======================================================
ÍCONE MÍDIAS — PLAY SIMPLES
======================================================= */

    .media-icon::before {
      content: "";
      position: absolute;

      width: 20px;
      height: 15px;

      left: 4px;
      top: 6px;

      border: 2px solid currentColor;
      border-radius: 5px;
    }

    .media-icon::after {
      content: "";
      position: absolute;

      left: 12px;
      top: 10px;

      width: 0;
      height: 0;

      border-left: 7px solid currentColor;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
    }

    /* =======================================================
ÍCONE PONTOS — ESTRELA SIMPLES
======================================================= */

    .trophy-icon::before {
      content: "★";
      position: absolute;

      left: 3px;
      top: -1px;

      font-size: 25px;
      line-height: 28px;
      color: currentColor;
    }

    .trophy-icon::after {
      content: "";
      position: absolute;

      width: 14px;
      height: 2px;

      left: 7px;
      bottom: 4px;

      border-radius: 999px;
      background: currentColor;
      opacity: .55;
    }

    /* =======================================================
ÍCONE FONTES — BANCO SIMPLES
======================================================= */

    .data-icon::before {
      content: "";
      position: absolute;

      width: 20px;
      height: 7px;

      left: 4px;
      top: 5px;

      border: 2px solid currentColor;
      border-radius: 50%;
    }

    .data-icon::after {
      content: "";
      position: absolute;

      width: 20px;
      height: 16px;

      left: 4px;
      top: 8px;

      border-left: 2px solid currentColor;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;

      border-radius: 0 0 8px 8px;

      box-shadow:
        inset 0 -5px 0 -3px currentColor;
    }

    /* =======================================================
ÍCONE LINHA DO TEMPO — PONTOS SIMPLES
======================================================= */

    .timeline-icon::before {
      content: "";
      position: absolute;

      width: 2px;
      height: 22px;

      left: 13px;
      top: 3px;

      border-radius: 999px;
      background: currentColor;
      opacity: .7;
    }

    .timeline-icon::after {
      content: "";
      position: absolute;

      width: 7px;
      height: 7px;

      left: 10.5px;
      top: 4px;

      border-radius: 50%;
      background: currentColor;

      box-shadow:
        0 8px 0 currentColor,
        0 16px 0 currentColor;
    }

    /* =======================================================
TEXTO DOS BOTÕES
======================================================= */

    .side-item span {
      font-size: 8.7px;
      font-weight: 800;

      color: var(--verde-950);

      letter-spacing: -0.32px;

      line-height: 1;
      text-align: center;

      max-width: 100%;

      white-space: nowrap;
    }

    /* =======================================================
BADGE
======================================================= */

    .badge {
      position: absolute;

      top: 9px;
      right: 12px;

      width: 7px;
      height: 7px;

      border-radius: 50%;

      background: #16a34a;

      border: 2px solid #ffffff;

      box-shadow:
        0 0 12px rgba(22, 163, 74, .76),
        0 0 22px rgba(22, 163, 74, .28);

      z-index: 2;
    }

    /* =======================================================
MAIN
======================================================= */

    .main {
      flex: 1;
      position: relative;
      overflow: hidden;
      padding: 10px;
    }

    /* =======================================================
IFRAME PRINCIPAL
======================================================= */

    #contentFrame {
      width: 100%;
      height: 100%;

      border: none;

      background: #fff;

      border-radius: 22px;

      box-shadow:
        0 18px 48px rgba(15, 23, 42, .08),
        0 6px 18px rgba(22, 163, 74, .06);

      overflow: hidden;
    }

    /* =======================================================
POPUP OVERLAY
======================================================= */

    .popup-overlay {
      position: fixed;
      inset: 0;

      background: rgba(5, 46, 26, .36);

      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);

      display: none;

      align-items: center;
      justify-content: center;

      padding: 22px;

      overflow: hidden;

      z-index: 999999;
    }

    /* =======================================================
POPUP BOX
======================================================= */

    .popup-box {
      width: 100%;
      max-width: 1600px;

      height: 94vh;
      height: 94dvh;

      max-height: 94vh;
      max-height: 94dvh;

      background: #ffffff;

      border-radius: 28px;

      overflow: hidden;

      display: flex;
      flex-direction: column;

      border: 1px solid rgba(187, 247, 208, .92);

      box-shadow:
        var(--sombra-popup),
        0 10px 34px rgba(22, 163, 74, .10);

      animation: popupShow .18s ease;

      position: relative;
    }

    /* =======================================================
ANIMAÇÃO POPUP
======================================================= */

    @keyframes popupShow {
      from {
        transform: scale(.97) translateY(10px);
        opacity: 0;
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    /* =======================================================
HEADER POPUP
======================================================= */

    .popup-header {
      width: 100%;
      min-height: 64px;

      padding: 0 20px;

      background:
        linear-gradient(180deg,
          #ffffff 0%,
          #f0fdf4 100%);

      border-bottom: 1px solid rgba(187, 247, 208, .9);

      display: flex;
      align-items: center;
      justify-content: space-between;

      position: sticky;
      top: 0;

      z-index: 20;

      flex-shrink: 0;
    }

    /* =======================================================
TÍTULO POPUP
======================================================= */

    .popup-title-area {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .popup-title-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;

      background: #16a34a;

      box-shadow:
        0 0 14px rgba(22, 163, 74, .70);

      flex-shrink: 0;
    }

    #popupTitulo {
      font-size: 16px;
      font-weight: 900;

      color: var(--verde-950);

      letter-spacing: -0.45px;

      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* =======================================================
BOTÃO FECHAR
======================================================= */

    .popup-header button {
      width: 40px;
      height: 40px;

      border: 1px solid rgba(134, 239, 172, .82);

      border-radius: 14px;

      background:
        linear-gradient(180deg,
          #ffffff,
          #dcfce7);

      cursor: pointer;

      font-size: 20px;
      font-weight: 900;

      color: var(--verde-900);

      transition: .18s ease;

      box-shadow:
        0 8px 18px rgba(22, 163, 74, .10),
        inset 0 1px 0 rgba(255, 255, 255, .92);

      flex-shrink: 0;
    }

    .popup-header button:hover {
      transform: scale(1.04);
      background: #ecfdf5;
    }

    /* =======================================================
CONTEÚDO POPUP
======================================================= */

    .popup-content {
      flex: 1;

      width: 100%;

      overflow: hidden;

      background:
        linear-gradient(135deg,
          #fbfffc,
          #eefbf3);

      padding: 14px;
    }

    /* =======================================================
IFRAME POPUP
======================================================= */

    .popup-content iframe {
      width: 100%;
      height: 100%;

      border: none;

      border-radius: 20px;

      background: #fff;

      box-shadow:
        0 12px 34px rgba(15, 23, 42, .07);

      overflow: hidden;
    }

    /* =======================================================
ACESSIBILIDADE
======================================================= */

    .side-item:focus-visible,
    .popup-header button:focus-visible {
      outline: 3px solid rgba(34, 197, 94, .38);
      outline-offset: 3px;
    }

    /* =======================================================
RESPONSIVO TABLET
======================================================= */

    @media(max-width:1100px) {

      .layout {
        padding-bottom: 74px;
      }

      .main {
        padding: 7px;
      }

      #contentFrame {
        border-radius: 18px;
      }

      .sidebar-black {
        position: fixed;

        left: 0;
        right: 0;
        bottom: 0;

        width: 100%;
        min-width: 100%;

        height: 74px;

        padding: 6px 7px;

        flex-direction: row;

        justify-content: space-between;

        gap: 5px;

        border-right: none;

        border-top: 1px solid rgba(134, 239, 172, .72);

        box-shadow: 0 -12px 30px rgba(22, 163, 74, .13);

        z-index: 999999;
      }

      .brand-box {
        display: none;
      }

      .side-item {
        min-height: 60px;
        height: 60px;

        flex: 1;

        gap: 4px;

        border-radius: 17px;
      }

      .side-item.active::before {
        width: 30px;
        height: 4px;

        left: 50%;
        top: -7px;

        transform: translateX(-50%);

        border-radius: 999px;
      }

      .side-icon {
        width: 25px;
        height: 25px;
      }

      .side-item span {
        font-size: 8px;
      }

      .badge {
        top: 7px;
        right: 12px;
      }

      .popup-overlay {
        padding: 10px;
      }

      .popup-box {
        height: 96dvh;
        max-height: 96dvh;
        border-radius: 22px;
      }

      .popup-header {
        min-height: 58px;
        padding: 0 13px;
      }

      #popupTitulo {
        font-size: 15px;
      }

      .popup-header button {
        width: 38px;
        height: 38px;
        border-radius: 13px;
      }

      .popup-content {
        padding: 9px;
      }

      .popup-content iframe {
        border-radius: 16px;
      }
    }

    /* =======================================================
RESPONSIVO CELULAR
======================================================= */

    @media(max-width:520px) {

      .layout {
        padding-bottom: 70px;
      }

      .main {
        padding: 5px;
      }

      #contentFrame {
        border-radius: 16px;
      }

      .sidebar-black {
        height: 70px;
        padding: 5px 4px;
        gap: 3px;
      }

      .side-item {
        min-height: 58px;
        height: 58px;

        border-radius: 15px;

        gap: 3px;
      }

      .side-icon {
        width: 23px;
        height: 23px;
      }

      .side-item span {
        font-size: 7.1px;
        letter-spacing: -0.42px;
      }

      .badge {
        width: 7px;
        height: 7px;

        top: 6px;
        right: 8px;
      }

      .popup-box {
        border-radius: 20px;
      }

      .popup-header {
        min-height: 55px;
      }

      #popupTitulo {
        font-size: 14px;
      }

      .popup-title-dot {
        width: 9px;
        height: 9px;
      }

      .popup-content {
        padding: 7px;
      }

      .popup-content iframe {
        border-radius: 14px;
      }

    }

    /* =======================================================
CELULAR MUITO PEQUENO
======================================================= */

    @media(max-width:380px) {

      .layout {
        padding-bottom: 66px;
      }

      .sidebar-black {
        height: 66px;
      }

      .side-item {
        min-height: 54px;
        height: 54px;
        border-radius: 14px;
      }

      .side-icon {
        width: 21px;
        height: 21px;
      }

      .side-item span {
        font-size: 6.5px;
      }

    }
  </style>
</head>

<body>

  <div class="layout">

    <!-- =======================================================
  MENU LATERAL / INFERIOR
  ======================================================= -->

    <nav class="sidebar-black" aria-label="Menu principal">


      <!-- DASHBOARD -->
      <div class="side-item active" role="button" tabindex="0" onclick="trocarPagina(this,'home.html')"
        onkeydown="ativarComEnter(event, this, 'home.html')">

        <div class="side-icon home-icon"></div>

        <span>Dashboard</span>

      </div>

      <!-- EQUIPE -->
      <div class="side-item" role="button" tabindex="0" onclick="trocarPagina(this,'../../../usuarios/usuarios.html')"
        onkeydown="ativarComEnter(event, this, '../../../usuarios/usuarios.html')">

        <div class="side-icon team-icon"></div>

        <span>Equipe</span>

      </div>

      <!-- CHECKLIST -->
      <div class="side-item" role="button" tabindex="0" onclick="trocarPagina(this,'tarefas.html')"
        onkeydown="ativarComEnter(event, this, 'tarefas.html')">

        <div class="side-icon task-icon"></div>

        <span>Checklist</span>

      </div>

      <!-- MÍDIAS -->
      <div class="side-item" role="button" tabindex="0" onclick="abrirPopup('inicio', this)"
        onkeydown="ativarPopupComEnter(event, 'inicio', this)">

        <div class="badge"></div>

        <div class="side-icon media-icon"></div>

        <span>Mídias</span>

      </div>

      <!-- PONTUAÇÃO -->
      <div class="side-item" role="button" tabindex="0" onclick="abrirPopup('planejador', this)"
        onkeydown="ativarPopupComEnter(event, 'planejador', this)">

        <div class="side-icon trophy-icon"></div>

        <span>Pontos</span>

      </div>

      <!-- FONTES -->
      <div class="side-item" role="button" tabindex="0" onclick="abrirPopup('ia', this)"
        onkeydown="ativarPopupComEnter(event, 'ia', this)">

        <div class="side-icon data-icon"></div>

        <span>Fontes</span>

      </div>

      <!-- LINHA DO TEMPO -->
      <div class="side-item" role="button" tabindex="0" onclick="abrirPopup('linha', this)"
        onkeydown="ativarPopupComEnter(event, 'linha', this)">

        <div class="side-icon timeline-icon"></div>

        <span>Linha</span>

      </div>

    </nav>

    <!-- =======================================================
  ÁREA PRINCIPAL
  ======================================================= -->

    <main class="main">

      <iframe id="contentFrame" src="home.html" loading="eager" title="CheckFlow Operacional"
        allow="clipboard-read; clipboard-write; fullscreen">
      </iframe>

    </main>

  </div>

  <!-- =======================================================
POPUP
======================================================= -->

  <div class="popup-overlay" id="popupOverlay" onclick="fecharPopupFora(event)" aria-hidden="true">

    <section class="popup-box" role="dialog" aria-modal="true" aria-labelledby="popupTitulo">

      <header class="popup-header">

        <div class="popup-title-area">

          <div class="popup-title-dot"></div>

          <div id="popupTitulo">
            Popup
          </div>

        </div>

        <button onclick="fecharPopup()" aria-label="Fechar popup">
        ×
      </button>

      </header>

      <div class="popup-content" id="popupContent">
      </div>

    </section>

  </div>

  <script>
    /* =======================================================
REFERÊNCIAS
======================================================= */

const frame =
document.getElementById('contentFrame')

const popupOverlay =
document.getElementById('popupOverlay')

const popupTitulo =
document.getElementById('popupTitulo')

const popupContent =
document.getElementById('popupContent')

/* =======================================================
TECLADO
======================================================= */

function ativarComEnter(event, el, url){

  if(event.key === 'Enter' || event.key === ' '){
    event.preventDefault()
    trocarPagina(el, url)
  }

}

function ativarPopupComEnter(event, tipo, el){

  if(event.key === 'Enter' || event.key === ' '){
    event.preventDefault()
    abrirPopup(tipo, el)
  }

}

/* =======================================================
TROCAR PÁGINA
======================================================= */

function trocarPagina(el,url){

  document
  .querySelectorAll('.side-item')
  .forEach(item=>{
    item.classList.remove('active')
  })

  if(el){
    el.classList.add('active')
  }

  fecharPopup()

  frame.src = url
}

/* =======================================================
BLOQUEAR ZOOM IOS / MOBILE
======================================================= */

document.addEventListener(
'gesturestart',
function(e){
  e.preventDefault()
}
)

document.addEventListener(
'gesturechange',
function(e){
  e.preventDefault()
}
)

document.addEventListener(
'gestureend',
function(e){
  e.preventDefault()
}
)

let lastTouchEnd = 0

document.addEventListener(
'touchend',
function(event){

  const now =
  new Date().getTime()

  if(now - lastTouchEnd <= 300){
    event.preventDefault()
  }

  lastTouchEnd = now

},
false
)

document.addEventListener(
'wheel',
function(e){

  if(e.ctrlKey){
    e.preventDefault()
  }

},
{
  passive:false
}
)

/* =======================================================
ABRIR POPUP
======================================================= */

function abrirPopup(tipo, el){

  document
  .querySelectorAll('.side-item')
  .forEach(item=>{
    item.classList.remove('active')
  })

  if(el){
    el.classList.add('active')
  }

  const config =
  popups[tipo] || {
    pagina:'popup/popup1.html',
    titulo:'Popup'
  }

  popupTitulo.innerHTML =
  config.titulo

  popupOverlay.style.display =
  'flex'

  popupOverlay.setAttribute(
    'aria-hidden',
    'false'
  )

  popupContent.innerHTML = `
    <iframe
      src="${config.pagina}"
      loading="lazy"
      title="${config.titulo}"
      allow="clipboard-read; clipboard-write; fullscreen">
    </iframe>
  `
}

/* =======================================================
FECHAR POPUP
======================================================= */

function fecharPopup(){

  if(!popupOverlay || !popupContent){
    return
  }

  popupOverlay.style.display =
  'none'

  popupOverlay.setAttribute(
    'aria-hidden',
    'true'
  )

  popupContent.innerHTML =
  ''
}

/* =======================================================
FECHAR FORA
======================================================= */

function fecharPopupFora(event){

  if(event.target.id === 'popupOverlay'){
    fecharPopup()
  }

}

/* =======================================================
FECHAR COM ESC
======================================================= */

document.addEventListener(
'keydown',
function(e){

  if(e.key === 'Escape'){
    fecharPopup()
  }

}
)
