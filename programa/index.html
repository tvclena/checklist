<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
minimum-scale=1.0,
user-scalable=no,
viewport-fit=cover"/>

<title>Grupo DV • Workspace</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =======================================================
RESET
======================================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#eef6ff;
  touch-action:manipulation;
}

/* =======================================================
VARIÁVEIS VISUAIS
======================================================= */

:root{
  --azul-900:#0f2f57;
  --azul-800:#123f73;
  --azul-700:#1d5fae;
  --azul-600:#2563eb;
  --azul-500:#3b82f6;
  --azul-400:#60a5fa;
  --azul-300:#93c5fd;
  --azul-200:#bfdbfe;
  --azul-100:#dbeafe;
  --azul-50:#eff6ff;

  --branco:#ffffff;
  --texto:#0f172a;
  --muted:#64748b;
  --linha:#dbeafe;

  --sombra-suave:
  0 18px 45px rgba(37,99,235,.14);

  --sombra-card:
  0 10px 28px rgba(15,23,42,.08);
}

/* =======================================================
LAYOUT PRINCIPAL
======================================================= */

.layout{
  width:100%;
  height:100vh;
  height:100dvh;
  display:flex;
  overflow:hidden;
  background:
  radial-gradient(circle at top left, rgba(59,130,246,.12), transparent 32%),
  linear-gradient(135deg,#f8fbff 0%,#eef6ff 48%,#eaf4ff 100%);
}

/* =======================================================
SIDEBAR AZUL CLARO PROFISSIONAL
======================================================= */

.sidebar-black{
  width:104px;
  min-width:104px;
  height:100%;

  background:
  linear-gradient(
    180deg,
    rgba(239,246,255,.98) 0%,
    rgba(219,234,254,.96) 50%,
    rgba(191,219,254,.94) 100%
  );

  border-right:
  1px solid rgba(147,197,253,.55);

  box-shadow:
  12px 0 35px rgba(37,99,235,.13);

  display:flex;
  flex-direction:column;
  align-items:center;

  padding:18px 10px;
  gap:9px;

  z-index:50;
}

/* =======================================================
ITEM DO MENU
======================================================= */

.side-item{
  width:100%;
  min-height:78px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:8px;

  cursor:pointer;
  position:relative;

  border-radius:24px;

  color:var(--azul-900);

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.72),
    rgba(239,246,255,.62)
  );

  border:
  1px solid rgba(147,197,253,.42);

  box-shadow:
  inset 0 1px 0 rgba(255,255,255,.86),
  0 8px 20px rgba(37,99,235,.045);

  transition:
  background .18s ease,
  transform .18s ease,
  box-shadow .18s ease,
  border-color .18s ease;
}

.side-item:hover{
  transform:
  translateY(-2px);

  border-color:
  rgba(96,165,250,.78);

  background:
  linear-gradient(
    180deg,
    #ffffff 0%,
    #eff6ff 100%
  );

  box-shadow:
  0 14px 32px rgba(37,99,235,.14),
  inset 0 1px 0 rgba(255,255,255,.95);
}

.side-item.active{
  background:
  linear-gradient(
    180deg,
    #ffffff 0%,
    #dbeafe 100%
  );

  border-color:
  rgba(59,130,246,.85);

  box-shadow:
  0 16px 34px rgba(37,99,235,.20),
  inset 0 1px 0 rgba(255,255,255,.95);
}

.side-item.active::before{
  content:"";

  position:absolute;

  left:-11px;
  top:50%;

  width:5px;
  height:38px;

  border-radius:999px;

  background:
  linear-gradient(
    180deg,
    #60a5fa,
    #2563eb
  );

  box-shadow:
  0 0 20px rgba(59,130,246,.65),
  0 0 42px rgba(59,130,246,.28);

  transform:
  translateY(-50%);
}

/* =======================================================
ÍCONE BASE — SILHUETAS
======================================================= */

.side-icon{
  width:38px;
  height:38px;

  border-radius:16px;

  background:
  linear-gradient(
    180deg,
    #ffffff 0%,
    #e0f2fe 100%
  );

  border:
  1px solid rgba(96,165,250,.54);

  position:relative;

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:
  inset 0 1px 0 rgba(255,255,255,.95),
  0 8px 18px rgba(37,99,235,.10);

  transition:.18s ease;
}

.side-item:hover .side-icon,
.side-item.active .side-icon{
  background:
  linear-gradient(
    180deg,
    #dbeafe 0%,
    #bfdbfe 100%
  );

  border-color:
  rgba(37,99,235,.72);

  box-shadow:
  0 10px 22px rgba(37,99,235,.18),
  inset 0 1px 0 rgba(255,255,255,.95);
}

/* =======================================================
SILHUETA HOME
======================================================= */

.home-icon::before{
  content:"";
  width:20px;
  height:17px;
  position:absolute;
  bottom:8px;
  background:var(--azul-700);
  border-radius:4px 4px 6px 6px;
}

.home-icon::after{
  content:"";
  width:18px;
  height:18px;
  position:absolute;
  top:8px;
  background:var(--azul-700);
  transform:rotate(45deg);
  border-radius:4px;
}

/* =======================================================
SILHUETA EQUIPE
======================================================= */

.team-icon::before{
  content:"";
  width:10px;
  height:10px;
  position:absolute;
  top:8px;
  left:14px;
  background:var(--azul-700);
  border-radius:50%;
  box-shadow:
  -8px 3px 0 -1px var(--azul-500),
  8px 3px 0 -1px var(--azul-500);
}

.team-icon::after{
  content:"";
  width:24px;
  height:12px;
  position:absolute;
  bottom:8px;
  left:7px;
  background:var(--azul-700);
  border-radius:12px 12px 7px 7px;
  box-shadow:
  -8px 2px 0 -3px var(--azul-500),
  8px 2px 0 -3px var(--azul-500);
}

/* =======================================================
SILHUETA TAREFAS
======================================================= */

.task-icon::before{
  content:"";
  width:22px;
  height:24px;
  position:absolute;
  background:var(--azul-700);
  border-radius:6px;
}

.task-icon::after{
  content:"";
  width:14px;
  height:8px;
  position:absolute;
  border-left:3px solid #ffffff;
  border-bottom:3px solid #ffffff;
  transform:rotate(-45deg);
  top:14px;
  left:12px;
}

/* =======================================================
SILHUETA MÍDIAS
======================================================= */

.media-icon::before{
  content:"";
  width:23px;
  height:18px;
  position:absolute;
  background:var(--azul-700);
  border-radius:6px;
}

.media-icon::after{
  content:"";
  width:0;
  height:0;
  position:absolute;
  border-left:8px solid #ffffff;
  border-top:5px solid transparent;
  border-bottom:5px solid transparent;
  left:16px;
}

/* =======================================================
SILHUETA PONTUAÇÃO
======================================================= */

.trophy-icon::before{
  content:"";
  width:18px;
  height:17px;
  position:absolute;
  top:8px;
  background:var(--azul-700);
  border-radius:5px 5px 9px 9px;
}

.trophy-icon::after{
  content:"";
  width:22px;
  height:20px;
  position:absolute;
  top:9px;
  border-left:4px solid var(--azul-700);
  border-right:4px solid var(--azul-700);
  border-radius:7px;
  box-shadow:
  0 13px 0 -8px var(--azul-700),
  0 20px 0 -7px var(--azul-700);
}

/* =======================================================
SILHUETA FONTES DE DADOS
======================================================= */

.data-icon::before{
  content:"";
  width:22px;
  height:24px;
  position:absolute;
  background:
  linear-gradient(
    180deg,
    var(--azul-600),
    var(--azul-700)
  );
  border-radius:50% / 14%;
  box-shadow:
  inset 0 4px 0 rgba(255,255,255,.38),
  inset 0 -5px 0 rgba(15,23,42,.14);
}

.data-icon::after{
  content:"";
  width:22px;
  height:7px;
  position:absolute;
  top:15px;
  border-top:1px solid rgba(255,255,255,.72);
  border-bottom:1px solid rgba(15,23,42,.15);
  border-radius:50%;
}

/* =======================================================
SILHUETA LINHA DO TEMPO
======================================================= */

.timeline-icon::before{
  content:"";
  width:4px;
  height:25px;
  position:absolute;
  left:17px;
  background:var(--azul-700);
  border-radius:999px;
}

.timeline-icon::after{
  content:"";
  width:9px;
  height:9px;
  position:absolute;
  left:14px;
  top:8px;
  background:var(--azul-700);
  border-radius:50%;
  box-shadow:
  0 9px 0 var(--azul-500),
  0 18px 0 var(--azul-700),
  9px 0 0 -2px var(--azul-300),
  9px 9px 0 -2px var(--azul-300),
  9px 18px 0 -2px var(--azul-300);
}

/* =======================================================
TEXTO DOS BOTÕES
======================================================= */

.side-item span{
  font-size:10.7px;
  font-weight:800;

  color:var(--azul-900);

  letter-spacing:-0.35px;

  line-height:1.05;
  text-align:center;

  max-width:100%;

  white-space:nowrap;
}

/* =======================================================
BADGE AZUL
======================================================= */

.badge{
  position:absolute;

  top:11px;
  right:17px;

  width:9px;
  height:9px;

  border-radius:50%;

  background:#2563eb;

  border:
  2px solid #ffffff;

  box-shadow:
  0 0 14px rgba(37,99,235,.72),
  0 0 26px rgba(37,99,235,.35);

  z-index:2;
}

/* =======================================================
MAIN
======================================================= */

.main{
  flex:1;
  background:
  linear-gradient(
    135deg,
    #f8fbff,
    #eff6ff
  );
  position:relative;
  overflow:hidden;
  padding:12px;
}

/* =======================================================
IFRAME PRINCIPAL
======================================================= */

#contentFrame{
  width:100%;
  height:100%;
  border:none;
  background:#fff;
  border-radius:24px;

  box-shadow:
  0 18px 46px rgba(15,23,42,.08);

  overflow:hidden;
}

/* =======================================================
POPUP OVERLAY
======================================================= */

.popup-overlay{
  position:fixed;
  inset:0;

  background:
  rgba(15,23,42,.42);

  backdrop-filter:
  blur(14px);

  -webkit-backdrop-filter:
  blur(14px);

  display:none;

  align-items:center;
  justify-content:center;

  padding:24px;

  overflow:hidden;

  z-index:999999;
}

/* =======================================================
POPUP BOX
======================================================= */

.popup-box{
  width:100%;
  max-width:1620px;

  height:94vh;
  height:94dvh;

  max-height:94vh;
  max-height:94dvh;

  background:#ffffff;

  border-radius:32px;

  overflow:hidden;

  display:flex;
  flex-direction:column;

  border:
  1px solid rgba(191,219,254,.9);

  box-shadow:
  0 35px 100px rgba(15,23,42,.24),
  0 12px 36px rgba(37,99,235,.12);

  animation:popupShow .18s ease;

  position:relative;
}

/* =======================================================
ANIMAÇÃO POPUP
======================================================= */

@keyframes popupShow{
  from{
    transform:
    scale(.96)
    translateY(12px);

    opacity:0;
  }

  to{
    transform:
    scale(1)
    translateY(0);

    opacity:1;
  }
}

/* =======================================================
HEADER POPUP
======================================================= */

.popup-header{
  width:100%;
  min-height:72px;

  padding:0 24px;

  background:
  linear-gradient(
    180deg,
    #ffffff 0%,
    #eff6ff 100%
  );

  border-bottom:
  1px solid rgba(191,219,254,.86);

  display:flex;
  align-items:center;
  justify-content:space-between;

  position:sticky;
  top:0;

  z-index:20;

  flex-shrink:0;
}

/* =======================================================
TÍTULO POPUP
======================================================= */

.popup-title-area{
  display:flex;
  align-items:center;
  gap:12px;
}

.popup-title-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#2563eb;
  box-shadow:
  0 0 16px rgba(37,99,235,.70);
}

#popupTitulo{
  font-size:18px;
  font-weight:900;

  color:var(--azul-900);

  letter-spacing:-0.5px;
}

/* =======================================================
BOTÃO FECHAR POPUP
======================================================= */

.popup-header button{
  width:44px;
  height:44px;

  border:
  1px solid rgba(147,197,253,.78);

  border-radius:16px;

  background:
  linear-gradient(
    180deg,
    #ffffff,
    #dbeafe
  );

  cursor:pointer;

  font-size:20px;
  font-weight:900;

  color:var(--azul-800);

  transition:.18s ease;

  box-shadow:
  0 8px 20px rgba(37,99,235,.10),
  inset 0 1px 0 rgba(255,255,255,.9);
}

.popup-header button:hover{
  background:
  linear-gradient(
    180deg,
    #eff6ff,
    #bfdbfe
  );

  transform:scale(1.04);
}

/* =======================================================
CONTEÚDO POPUP
======================================================= */

.popup-content{
  flex:1;

  width:100%;

  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    #f8fbff,
    #eff6ff
  );

  padding:18px;

  scroll-behavior:smooth;
}

/* =======================================================
IFRAME POPUP
======================================================= */

.popup-content iframe{
  width:100%;
  height:100%;

  border:none;

  border-radius:22px;

  background:#fff;

  box-shadow:
  0 12px 34px rgba(15,23,42,.08);

  overflow:hidden;
}

/* =======================================================
RESPONSIVO TABLET
======================================================= */

@media(max-width:1100px){

  .layout{
    padding-bottom:86px;
  }

  .main{
    padding:8px;
  }

  #contentFrame{
    border-radius:20px;
  }

  .sidebar-black{
    position:fixed;

    left:0;
    right:0;
    bottom:0;

    width:100%;
    min-width:100%;

    height:86px;

    padding:7px 8px;

    flex-direction:row;

    justify-content:space-between;

    gap:6px;

    border-right:none;

    border-top:
    1px solid rgba(147,197,253,.70);

    box-shadow:
    0 -16px 34px rgba(37,99,235,.17);

    z-index:999999;

  }

  .popup-box{

    height:96dvh;
    max-height:96dvh;

    border-radius:24px;
  }

  .popup-header{
    min-height:62px;
    padding:0 14px;
  }

  #popupTitulo{
    font-size:16px;
  }

  .popup-header button{
    width:40px;
    height:40px;
    border-radius:14px;
  }

  .popup-content{

  }

  .popup-content iframe{

  }

  .home-icon::before{

  }

  .team-icon::after{

  }

  }

  .task-icon::after{

  }

  .media-icon::before{
    width:21px;

  }

  .media-icon::after{

  .trophy-icon::before{

  }

  .trophy-icon::after{

  .data-icon::before{

/* =======================================================
RESPONSIVO CELULAR
======================================================= */

@media(max-width:520px){

  .layout{
    padding-bottom:82px;
  }

  .main{
    padding:6px;
  }

  #contentFrame{
    border-radius:18px;
  }

  .sidebar-black{
    height:82px;
    padding:6px 4px;
    gap:4px;
  }

  .side-item{
    min-height:68px;

  }

  }

  }

  .badge{

  }

  .popup-box{

  }

  }

  }

  .popup-content{
    padding:8px;
  }

  .popup-content iframe{
    border-radius:15px;
  }

</style>
</head>

<body>

<div class="layout">

  <!-- =======================================================
  NAVBAR / MENU LATERAL
  ======================================================= -->

  <div class="sidebar-black">

    <!-- DASHBOARD -->
    <div class="side-item active"
         onclick="trocarPagina(this,'home.html')">

      <div class="side-icon home-icon"></div>

      <span>Dashboard</span>

    </div>

    <!-- EQUIPE -->
    <div class="side-item"
         onclick="trocarPagina(this,'../../../usuarios/usuarios.html')">

      <div class="side-icon team-icon"></div>

      <span>Equipe</span>

    </div>

    <!-- TAREFAS -->
    <div class="side-item"
         onclick="trocarPagina(this,'tarefas.html')">

      <div class="side-icon task-icon"></div>

      <span>Tarefas</span>

    </div>

    <!-- MÍDIAS -->
    <div class="side-item"
         onclick="abrirPopup('inicio', this)">

      <div class="badge"></div>

      <div class="side-icon media-icon"></div>

      <span>Mídias</span>

    </div>

    <!-- PONTUAÇÃO -->
    <div class="side-item"
         onclick="abrirPopup('planejador', this)">

      <div class="side-icon trophy-icon"></div>

      <span>Pontuação</span>

    </div>

    <!-- FONTES -->
    <div class="side-item"
         onclick="abrirPopup('ia', this)">

      <div class="side-icon data-icon"></div>

      <span>Fontes</span>

    </div>

    <!-- LINHA DO TEMPO -->
    <div class="side-item"
         onclick="abrirPopup('linha', this)">

      <div class="side-icon timeline-icon"></div>

      <span>Linha</span>

    </div>

  </div>

  <!-- =======================================================
  ÁREA PRINCIPAL
  ======================================================= -->

  <div class="main">

    <iframe
      id="contentFrame"
      src="home.html"
      loading="eager"
      allow="clipboard-read; clipboard-write; fullscreen">
    </iframe>

  </div>

</div>

<!-- =======================================================
POPUP
======================================================= -->

<div class="popup-overlay"
     id="popupOverlay"
     onclick="fecharPopupFora(event)">

  <div class="popup-box">

    <div class="popup-header">

      <div class="popup-title-area">

        <div class="popup-title-dot"></div>

        <div id="popupTitulo">
          Popup
        </div>

      </div>

      <button onclick="fecharPopup()" aria-label="Fechar popup">
        ×
      </button>

    </div>

    <div class="popup-content"
         id="popupContent">

    </div>

  </div>

</div>

<script>

/* =======================================================
FRAME PRINCIPAL
======================================================= */

const frame =
document.getElementById('contentFrame')

/* =======================================================
TROCAR PÁGINA PRINCIPAL
======================================================= */

function trocarPagina(el,url){

  document
  .querySelectorAll('.side-item')
  .forEach(item=>{
    item.classList.remove('active')
  })

  if(el){
    el.classList.add('active')
  }

  fecharPopup()

  frame.src = url
}

/* =======================================================
BLOQUEAR ZOOM IOS / MOBILE
======================================================= */

document.addEventListener(
'gesturestart',
function(e){
  e.preventDefault()
}
)

document.addEventListener(
'gesturechange',
function(e){
  e.preventDefault()
}
)

document.addEventListener(
'gestureend',
function(e){
  e.preventDefault()
}
)

let lastTouchEnd = 0

document.addEventListener(
'touchend',
function(event){

  const now =
  new Date().getTime()

  if(now - lastTouchEnd <= 300){
    event.preventDefault()
  }

  lastTouchEnd = now

},
false
)

document.addEventListener(
'wheel',
function(e){

  if(e.ctrlKey){
    e.preventDefault()
  }

},
{
  passive:false
}
)

/* =======================================================
POPUP
======================================================= */

function abrirPopup(tipo, el){

  document
  .querySelectorAll('.side-item')
  .forEach(item=>{
    item.classList.remove('active')
  })

  if(el){
    el.classList.add('active')
  }

  const overlay =
  document.getElementById("popupOverlay")

  const titulo =
  document.getElementById("popupTitulo")

  const content =
  document.getElementById("popupContent")

  let pagina = ""
  let nomeTitulo = ""

  if(tipo === "inicio"){
    pagina = "popup/popup1.html"
    nomeTitulo = "Mídias"
  }

  else if(tipo === "planejador"){
    pagina = "popup/popup2.html"
    nomeTitulo = "Pontuação"
  }

  else if(tipo === "ia"){
    pagina = "popup/popup3.html"
    nomeTitulo = "Fontes de Dados"
  }

  else if(tipo === "linha"){
    pagina = "linha_do_tempo.html"
    nomeTitulo = "Linha do Tempo"
  }

  else if(tipo === "equipes"){
    pagina = "popup/popup4.html"
    nomeTitulo = "Equipes"
  }

  else if(tipo === "metas"){
    pagina = "popup/popup5.html"
    nomeTitulo = "Metas"
  }

  else if(tipo === "planilhas"){
    pagina = "popup/popup6.html"
    nomeTitulo = "Planilhas"
  }

  else if(tipo === "mais"){
    pagina = "popup/popup7.html"
    nomeTitulo = "Mais"
  }

  else{
    pagina = "popup/popup1.html"
    nomeTitulo = "Popup"
  }

  titulo.innerHTML =
  nomeTitulo

  overlay.style.display =
  "flex"

  content.innerHTML = `
    <iframe
      src="${pagina}"
      loading="lazy"
      allow="clipboard-read; clipboard-write; fullscreen">
    </iframe>
  `
}

/* =======================================================
FECHAR POPUP
======================================================= */

function fecharPopup(){

  const overlay =
  document.getElementById("popupOverlay")

  const content =
  document.getElementById("popupContent")

  if(!overlay || !content){
    return
  }

  overlay.style.display =
  "none"

  content.innerHTML =
  ""
}

/* =======================================================
FECHAR CLICANDO FORA
======================================================= */

function fecharPopupFora(event){

  if(event.target.id === "popupOverlay"){
    fecharPopup()
  }

}

/* =======================================================
FECHAR COM ESC
======================================================= */

document.addEventListener(
'keydown',
function(e){

  if(e.key === 'Escape'){
    fecharPopup()
  }

}
)

</script>
